  <path class="l" d="M245 358 L330 445"/>
  <path class="l" d="M235 507 L370 577"/>
  <path class="l" d="M590 240 L680 215"/>
  <path class="l" d="M590 445 L680 455"/>
  <path class="l" d="M950 220 L1035 190"/>
  <path class="l" d="M950 465 L1035 190"/>
  <path class="l" d="M1125 235 L1125 295"/>
  <path class="l" d="M1125 400 L1125 465"/>
  <path class="d" d="M1035 190 C1245 190 1245 160 1288 160"/>
  <path class="d" d="M1035 190 C1245 190 1245 265 1288 265"/>
